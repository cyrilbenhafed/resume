title:
  fr: "Senior Data Scientist"
  en: "Senior Data Scientist"

summary:
  fr: >
    Senior Data Scientist spécialisé en machine learning et MLOps. 8+ ans d'expérience
    en analytics et modélisation prédictive (churn, scoring, recommandation). Expert
    en industrialisation de workflows (Databricks, CI/CD) avec focus sur l'impact
    business mesurable. Expérience de management d'équipe data/CRM. Passionné par
    la transmission de connaissances (open-source, mentorat).
  en: >
    Senior Data Scientist specializing in machine learning and MLOps. 8+ years in
    analytics and predictive modeling (churn, scoring, recommender systems). Expert
    in workflow industrialization (Databricks, CI/CD) with focus on measurable business
    impact. Previous data/CRM team management experience. Passionate about knowledge
    sharing (open-source, mentoring).

