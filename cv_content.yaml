title:
  fr: "Data Scientist Senior"
  en: "Senior Data Scientist"

summary:
  fr: >
    Data Scientist senior, spécialisé en machine learning et MLOps. Expérimenté
    dans la conception et le déploiement de modèles prédictifs (churn, segmentation,
    recommandation) et dans l’industrialisation de workflows avec Databricks, Python/R
    et CI/CD. Je combine expertise technique et vision business pour délivrer un impact
    mesurable à grande échelle.
  en: >
    Senior Data Scientist with expertise in machine learning and MLOps. Experienced
    in designing and deploying predictive models (churn, segmentation, recommender
    systems) and industrializing workflows with Databricks, Python/R, and CI/CD.
    Combining technical skills with business insight, I deliver measurable large-scale impact.


